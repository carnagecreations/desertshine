<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Dark blue background square (modern favicon) -->
  <rect width="192" height="192" fill="#0d3b5c" rx="45"/>

  <!-- Stylized checkmark + sparkle (cleaning symbolism) -->
  <g transform="translate(96, 96)">
    <!-- Checkmark -->
    <path
      d="M -35 0 L -10 25 L 45 -30"
      stroke="#e85d2f"
      stroke-width="16"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Sparkle dots (cleanliness) -->
    <circle cx="55" cy="-50" r="7" fill="#e85d2f"/>
    <circle cx="-60" cy="-35" r="5" fill="#e85d2f" opacity="0.7"/>
  </g>
</svg>